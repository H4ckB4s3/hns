<script>
    (function() {
        const canvas = document.getElementById('blueprint-canvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let points = [];
        let mouseX = width / 2, mouseY = height / 2;
        let mouseInfluence = 0.6;
        
        // Blueprint engineering aesthetic
        const GRID_MAIN = 48;
        const GRID_SUB = 24;
        const POINT_COUNT = 110;
        const CONNECTION_DIST = 175;
        const BASE_POINT_SIZE = 2.2;
        
        // Track mouse position
        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        
        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        
        // Create points with organic initial positions (blueprint nodes)
        function initPoints() {
            points = [];
            for (let i = 0; i < POINT_COUNT; i++) {
                points.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    vx: (Math.random() - 0.5) * 0.22,
                    vy: (Math.random() - 0.5) * 0.22,
                    radius: BASE_POINT_SIZE + Math.random() * 1.5,
                    originalRadius: BASE_POINT_SIZE + Math.random() * 1.5,
                    phase: Math.random() * Math.PI * 2,
                });
            }
        }
        
        // ========== DRAW ENGINEERING GRID (Blueprint style) ==========
        function drawBlueprintGrid() {
            ctx.save();
            
            // Major grid lines (cyan/blueprint)
            ctx.beginPath();
            ctx.strokeStyle = 'rgba(56, 128, 200, 0.22)';
            ctx.lineWidth = 0.7;
            for (let x = 0; x < width; x += GRID_MAIN) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, height);
                ctx.stroke();
            }
            for (let y = 0; y < height; y += GRID_MAIN) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(width, y);
                ctx.stroke();
            }
            
            // Minor grid (faint, more technical)
            ctx.strokeStyle = 'rgba(56, 128, 200, 0.1)';
            ctx.lineWidth = 0.4;
            for (let x = 0; x < width; x += GRID_SUB) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, height);
                ctx.stroke();
            }
            for (let y = 0; y < height; y += GRID_SUB) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(width, y);
                ctx.stroke();
            }
            
            // Additional diagonal blueprint draft lines (gives architectural feel)
            ctx.strokeStyle = 'rgba(56, 128, 200, 0.05)';
            ctx.lineWidth = 0.5;
            for (let i = -height; i < width + height; i += 70) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i + height, height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(i, height);
                ctx.lineTo(i + height, 0);
                ctx.stroke();
            }
            
            ctx.restore();
        }
        
        // ========== SMART CONNECTIONS (forming networks like a blueprint coming together) ==========
        function drawConnections() {
            // We draw lines gradually based on distance and also mouse proximity adds "attraction glow"
            for (let i = 0; i < points.length; i++) {
                for (let j = i + 1; j < points.length; j++) {
                    const p1 = points[i];
                    const p2 = points[j];
                    const dx = p1.x - p2.x;
                    const dy = p1.y - p2.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance < CONNECTION_DIST) {
                        // Calculate opacity based on distance (closer = stronger)
                        let opacity = (1 - distance / CONNECTION_DIST) * 0.55;
                        
                        // MOUSE INFLUENCE: if line passes near mouse, enhance opacity (makes it interactive)
                        const midX = (p1.x + p2.x) / 2;
                        const midY = (p1.y + p2.y) / 2;
                        const mouseDist = Math.hypot(midX - mouseX, midY - mouseY);
                        if (mouseDist < 120) {
                            const influence = (1 - mouseDist / 120) * 0.45;
                            opacity = Math.min(0.88, opacity + influence);
                        }
                        
                        ctx.beginPath();
                        ctx.moveTo(p1.x, p1.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.strokeStyle = `rgba(90, 160, 235, ${opacity})`;
                        ctx.lineWidth = 0.9 + (opacity * 0.6);
                        ctx.stroke();
                    }
                }
            }
        }
        
        // ========== NODES: blueprint nodes with technical rings ==========
        function drawNodes() {
            for (let i = 0; i < points.length; i++) {
                const p = points[i];
                
                // Mouse attraction effect: nodes near mouse get larger and brighter
                const mouseDist = Math.hypot(p.x - mouseX, p.y - mouseY);
                let scaleFactor = 1;
                let glowIntensity = 0;
                if (mouseDist < 100) {
                    scaleFactor = 1 + (1 - mouseDist / 100) * 0.6;
                    glowIntensity = (1 - mouseDist / 100) * 0.7;
                }
                
                const currentRadius = p.radius * scaleFactor;
                
                // Outer engineering ring (blueprint style)
                ctx.beginPath();
                ctx.arc(p.x, p.y, currentRadius + 3 + glowIntensity * 4, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(64, 140, 210, ${0.12 + glowIntensity * 0.2})`;
                ctx.fill();
                
                // Secondary ring (dashed blueprint effect)
                ctx.beginPath();
                ctx.arc(p.x, p.y, currentRadius + 1.5, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(100, 180, 250, ${0.3 + glowIntensity * 0.4})`;
                ctx.lineWidth = 0.8;
                ctx.stroke();
                
                // Core node
                ctx.beginPath();
                ctx.arc(p.x, p.y, currentRadius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(140, 200, 255, ${0.85 + glowIntensity * 0.15})`;
                ctx.fill();
                
                // Inner bright dot (highlights)
                ctx.beginPath();
                ctx.arc(p.x, p.y, currentRadius * 0.45, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 245, 0.95)`;
                ctx.fill();
                
                // Optional: tiny crosshair (blueprint signature)
                ctx.beginPath();
                ctx.moveTo(p.x - currentRadius * 0.8, p.y);
                ctx.lineTo(p.x + currentRadius * 0.8, p.y);
                ctx.moveTo(p.x, p.y - currentRadius * 0.8);
                ctx.lineTo(p.x, p.y + currentRadius * 0.8);
                ctx.strokeStyle = `rgba(180, 220, 255, 0.5)`;
                ctx.lineWidth = 0.6;
                ctx.stroke();
            }
        }
        
        // ========== Additional "Blueprint Forming" effect: floating design elements ==========
        let timeOffset = 0;
        function drawBlueprintFormingEffects() {
            timeOffset += 0.008;
            
            // Draw technical arcs / connection pulses that move like a schematic building itself
            for (let i = 0; i < points.length; i += 4) {
                const p = points[i];
                const pulse = (Math.sin(timeOffset * 1.5 + p.x * 0.01) + 1) / 2;
                if (pulse > 0.65) {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 12 + pulse * 6, 0, Math.PI * 2);
                    ctx.strokeStyle = `rgba(70, 150, 230, ${0.12 + pulse * 0.1})`;
                    ctx.lineWidth = 0.8;
                    ctx.stroke();
                }
            }
            
            // "Drafting lines" - moving construction lines
            ctx.save();
            ctx.globalCompositeOperation = 'lighter';
            for (let i = 0; i < 12; i++) {
                const angle = timeOffset * 0.6 + i;
                const rad = (angle % (Math.PI * 2));
                const x1 = width / 2 + Math.cos(rad) * 180;
                const y1 = height / 2 + Math.sin(rad) * 180;
                const x2 = width / 2 + Math.cos(rad + Math.PI) * 180;
                const y2 = height / 2 + Math.sin(rad + Math.PI) * 180;
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.strokeStyle = `rgba(70, 140, 210, 0.08)`;
                ctx.lineWidth = 1.2;
                ctx.stroke();
            }
            ctx.restore();
        }
        
        // ========== UPDATE PARTICLES WITH MOUSE ATTRACTION (makes it interactive) ==========
        function updatePoints() {
            for (let i = 0; i < points.length; i++) {
                const p = points[i];
                
                // Mouse attraction force (makes the blueprint follow cursor slightly)
                const dxMouse = mouseX - p.x;
                const dyMouse = mouseY - p.y;
                const distToMouse = Math.hypot(dxMouse, dyMouse);
                if (distToMouse < 180) {
                    const force = (1 - distToMouse / 180) * 0.018;
                    p.vx += dxMouse * force;
                    p.vy += dyMouse * force;
                }
                
                // Damping to keep motion smooth
                p.vx *= 0.99;
                p.vy *= 0.99;
                
                // Limit speed
                const maxSpeed = 1.6;
                p.vx = Math.min(maxSpeed, Math.max(-maxSpeed, p.vx));
                p.vy = Math.min(maxSpeed, Math.max(-maxSpeed, p.vy));
                
                p.x += p.vx;
                p.y += p.vy;
                
                // Boundary with smooth bounce + padding
                const padding = 20;
                if (p.x < padding) { p.x = padding; p.vx *= -0.96; }
                if (p.x > width - padding) { p.x = width - padding; p.vx *= -0.96; }
                if (p.y < padding) { p.y = padding; p.vy *= -0.96; }
                if (p.y > height - padding) { p.y = height - padding; p.vy *= -0.96; }
            }
        }
        
        // ========== DRAW BLUEPRINT "SCHEMATIC" TEXTURE OVERLAY ==========
        function drawBlueprintWatermark() {
            ctx.font = "12px 'Courier New', monospace";
            ctx.fillStyle = "rgba(70, 130, 200, 0.12)";
            for (let i = 0; i < 18; i++) {
                const x = (i * 127) % width;
                const y = (i * 83) % height;
                ctx.fillText("HNS::SCHEMA v1.0", x, y);
                ctx.fillText("// blueprint_active", x + 40, y + 18);
            }
        }
        
        // ========== MAIN RENDER LOOP ==========
        function render() {
            if (!ctx) return;
            ctx.clearRect(0, 0, width, height);
            
            // Deep dark blueprint background
            ctx.fillStyle = '#05070a';
            ctx.fillRect(0, 0, width, height);
            
            drawBlueprintGrid();
            drawConnections();
            drawNodes();
            drawBlueprintFormingEffects();
            drawBlueprintWatermark();
        }
        
        function animate() {
            updatePoints();
            render();
            requestAnimationFrame(animate);
        }
        
        function handleResize() {
            resizeCanvas();
            initPoints();
        }
        
        resizeCanvas();
        initPoints();
        
        // Set mouse initial pos to center
        mouseX = width / 2;
        mouseY = height / 2;
        
        window.addEventListener('resize', handleResize);
        animate();
        
        // small optimization: on mouse leave, no big issue
        window.addEventListener('mouseleave', () => {
            // no extra action, just keep inertia natural
        });
    })();
</script>
</body>
