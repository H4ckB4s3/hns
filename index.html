<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>HNS.ONL — Handshake Scripts & APIs</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #05070a;
            color: #eef2ff;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        /* Canvas Background */
        #blueprint-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            z-index: 0;
        }

        /* Content Overlay */
        .content {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(2px);
        }

        /* Main Card */
        .card {
            background: rgba(8, 12, 20, 0.65);
            backdrop-filter: blur(16px);
            border-radius: 2.5rem;
            padding: 3rem 3rem;
            text-align: center;
            border: 1px solid rgba(64, 128, 192, 0.35);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(64, 128, 192, 0.1) inset;
            max-width: 520px;
            width: 90%;
            transition: transform 0.3s ease;
        }

        .logo {
            margin-bottom: 1.2rem;
        }

        .logo h1 {
            font-size: 4.2rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #ffffff, #8bb4e6, #4f8bc0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 40px rgba(79, 139, 192, 0.3);
        }

        .tagline {
            font-size: 1rem;
            color: #9ab3d4;
            letter-spacing: 0.5px;
            font-weight: 400;
            margin-bottom: 2.5rem;
            border-top: 1px solid rgba(79, 139, 192, 0.25);
            display: inline-block;
            padding-top: 1rem;
        }

        /* Button Group - Stacked */
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            width: 100%;
            margin-bottom: 2rem;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            padding: 1rem 1.5rem;
            background: rgba(20, 28, 40, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(64, 128, 192, 0.35);
            border-radius: 1.2rem;
            color: #e2ecff;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            letter-spacing: 0.3px;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(100, 170, 240, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:hover {
            background: rgba(52, 152, 219, 0.25);
            border-color: #4f9bdb;
            transform: translateY(-3px) scale(1.01);
            box-shadow: 0 12px 28px -8px rgba(52, 152, 219, 0.3);
            color: white;
        }

        .btn i {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        /* Profile Button (special subtle style) */
        .profile-btn {
            background: rgba(10, 16, 26, 0.6);
            border-color: rgba(79, 139, 192, 0.25);
            justify-content: center;
            margin-top: 0.5rem;
        }

        .profile-btn i {
            font-size: 0.95rem;
        }

        /* Divider */
        .divider {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #4f8bc0, transparent);
            margin: 1rem auto 1.2rem;
        }

        footer {
            margin-top: 2rem;
            font-size: 0.7rem;
            color: #5c7295;
            letter-spacing: 0.5px;
        }

        @media (max-width: 550px) {
            .card {
                padding: 2rem 1.5rem;
                width: 92%;
            }
            .logo h1 {
                font-size: 2.8rem;
            }
            .btn {
                padding: 0.8rem 1.2rem;
                font-size: 0.9rem;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

<canvas id="blueprint-canvas"></canvas>

<div class="content">
    <div class="card">
        <div class="logo">
            <h1>HNS.ONL</h1>
        </div>
        <div class="tagline">
            Handshake Scripts & APIs
        </div>

        <div class="button-group">
            <a href="https://resolve.hns.onl" class="btn" target="_blank" rel="noopener">
                <i class="fas fa-terminal"></i> Resolve HNS
            </a>
            <a href="https://setup.hns.onl" class="btn" target="_blank" rel="noopener">
                <i class="fas fa-terminal"></i> Setup a Website
            </a>
            <a href="https://shop.hns.onl" class="btn" target="_blank" rel="noopener">
                <i class="fas fa-store"></i> Shop
            </a>
            <a href="https://sponsor.hns.onl" class="btn" target="_blank" rel="noopener">
                <i class="fas fa-heart"></i> Sponsor us
            </a>
        </div>

        <div class="divider"></div>

        <div class="button-group" style="margin-bottom: 0;">
            <a href="https://hns.bio/hns.onl" class="btn profile-btn" target="_blank" rel="noopener">
                <i class="fas fa-id-card"></i> Profile
            </a>
        </div>

        <footer>
            <i class="fas fa-cube"></i> decentralized infrastructure
        </footer>
    </div>
</div>

<script>
    (function() {
        const canvas = document.getElementById('blueprint-canvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let points = [];
        let mouseX = width / 2, mouseY = height / 2;
        let mouseInfluence = 0.6;
        
        // Blueprint engineering aesthetic
        const GRID_MAIN = 48;
        const GRID_SUB = 24;
        const POINT_COUNT = 110;
        const CONNECTION_DIST = 175;
        const BASE_POINT_SIZE = 2.2;
        
        // Track mouse position
        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        
        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        
        // Create points with organic initial positions (blueprint nodes)
        function initPoints() {
            points = [];
            for (let i = 0; i < POINT_COUNT; i++) {
                points.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    vx: (Math.random() - 0.5) * 0.22,
                    vy: (Math.random() - 0.5) * 0.22,
                    radius: BASE_POINT_SIZE + Math.random() * 1.5,
                    originalRadius: BASE_POINT_SIZE + Math.random() * 1.5,
                    phase: Math.random() * Math.PI * 2,
                });
            }
        }
        
        // ========== DRAW ENGINEERING GRID (Blueprint style) ==========
        function drawBlueprintGrid() {
            ctx.save();
            
            // Major grid lines (cyan/blueprint)
            ctx.beginPath();
            ctx.strokeStyle = 'rgba(56, 128, 200, 0.22)';
            ctx.lineWidth = 0.7;
            for (let x = 0; x < width; x += GRID_MAIN) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, height);
                ctx.stroke();
            }
            for (let y = 0; y < height; y += GRID_MAIN) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(width, y);
                ctx.stroke();
            }
            
            // Minor grid (faint, more technical)
            ctx.strokeStyle = 'rgba(56, 128, 200, 0.1)';
            ctx.lineWidth = 0.4;
            for (let x = 0; x < width; x += GRID_SUB) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, height);
                ctx.stroke();
            }
            for (let y = 0; y < height; y += GRID_SUB) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(width, y);
                ctx.stroke();
            }
            
            // Additional diagonal blueprint draft lines (gives architectural feel)
            ctx.strokeStyle = 'rgba(56, 128, 200, 0.05)';
            ctx.lineWidth = 0.5;
            for (let i = -height; i < width + height; i += 70) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i + height, height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(i, height);
                ctx.lineTo(i + height, 0);
                ctx.stroke();
            }
            
            ctx.restore();
        }
        
        // ========== SMART CONNECTIONS (forming networks like a blueprint coming together) ==========
        function drawConnections() {
            // We draw lines gradually based on distance and also mouse proximity adds "attraction glow"
            for (let i = 0; i < points.length; i++) {
                for (let j = i + 1; j < points.length; j++) {
                    const p1 = points[i];
                    const p2 = points[j];
                    const dx = p1.x - p2.x;
                    const dy = p1.y - p2.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance < CONNECTION_DIST) {
                        // Calculate opacity based on distance (closer = stronger)
                        let opacity = (1 - distance / CONNECTION_DIST) * 0.55;
                        
                        // MOUSE INFLUENCE: if line passes near mouse, enhance opacity (makes it interactive)
                        const midX = (p1.x + p2.x) / 2;
                        const midY = (p1.y + p2.y) / 2;
                        const mouseDist = Math.hypot(midX - mouseX, midY - mouseY);
                        if (mouseDist < 120) {
                            const influence = (1 - mouseDist / 120) * 0.45;
                            opacity = Math.min(0.88, opacity + influence);
                        }
                        
                        ctx.beginPath();
                        ctx.moveTo(p1.x, p1.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.strokeStyle = `rgba(90, 160, 235, ${opacity})`;
                        ctx.lineWidth = 0.9 + (opacity * 0.6);
                        ctx.stroke();
                    }
                }
            }
        }
        
        // ========== NODES: blueprint nodes with technical rings ==========
        function drawNodes() {
            for (let i = 0; i < points.length; i++) {
                const p = points[i];
                
                // Mouse attraction effect: nodes near mouse get larger and brighter
                const mouseDist = Math.hypot(p.x - mouseX, p.y - mouseY);
                let scaleFactor = 1;
                let glowIntensity = 0;
                if (mouseDist < 100) {
                    scaleFactor = 1 + (1 - mouseDist / 100) * 0.6;
                    glowIntensity = (1 - mouseDist / 100) * 0.7;
                }
                
                const currentRadius = p.radius * scaleFactor;
                
                // Outer engineering ring (blueprint style)
                ctx.beginPath();
                ctx.arc(p.x, p.y, currentRadius + 3 + glowIntensity * 4, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(64, 140, 210, ${0.12 + glowIntensity * 0.2})`;
                ctx.fill();
                
                // Secondary ring (dashed blueprint effect)
                ctx.beginPath();
                ctx.arc(p.x, p.y, currentRadius + 1.5, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(100, 180, 250, ${0.3 + glowIntensity * 0.4})`;
                ctx.lineWidth = 0.8;
                ctx.stroke();
                
                // Core node
                ctx.beginPath();
                ctx.arc(p.x, p.y, currentRadius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(140, 200, 255, ${0.85 + glowIntensity * 0.15})`;
                ctx.fill();
                
                // Inner bright dot (highlights)
                ctx.beginPath();
                ctx.arc(p.x, p.y, currentRadius * 0.45, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 245, 0.95)`;
                ctx.fill();
                
                // Optional: tiny crosshair (blueprint signature)
                ctx.beginPath();
                ctx.moveTo(p.x - currentRadius * 0.8, p.y);
                ctx.lineTo(p.x + currentRadius * 0.8, p.y);
                ctx.moveTo(p.x, p.y - currentRadius * 0.8);
                ctx.lineTo(p.x, p.y + currentRadius * 0.8);
                ctx.strokeStyle = `rgba(180, 220, 255, 0.5)`;
                ctx.lineWidth = 0.6;
                ctx.stroke();
            }
        }
        
        // ========== Additional "Blueprint Forming" effect: floating design elements ==========
        let timeOffset = 0;
        function drawBlueprintFormingEffects() {
            timeOffset += 0.008;
            
            // Draw technical arcs / connection pulses that move like a schematic building itself
            for (let i = 0; i < points.length; i += 4) {
                const p = points[i];
                const pulse = (Math.sin(timeOffset * 1.5 + p.x * 0.01) + 1) / 2;
                if (pulse > 0.65) {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 12 + pulse * 6, 0, Math.PI * 2);
                    ctx.strokeStyle = `rgba(70, 150, 230, ${0.12 + pulse * 0.1})`;
                    ctx.lineWidth = 0.8;
                    ctx.stroke();
                }
            }
            
            // "Drafting lines" - moving construction lines
            ctx.save();
            ctx.globalCompositeOperation = 'lighter';
            for (let i = 0; i < 12; i++) {
                const angle = timeOffset * 0.6 + i;
                const rad = (angle % (Math.PI * 2));
                const x1 = width / 2 + Math.cos(rad) * 180;
                const y1 = height / 2 + Math.sin(rad) * 180;
                const x2 = width / 2 + Math.cos(rad + Math.PI) * 180;
                const y2 = height / 2 + Math.sin(rad + Math.PI) * 180;
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.strokeStyle = `rgba(70, 140, 210, 0.08)`;
                ctx.lineWidth = 1.2;
                ctx.stroke();
            }
            ctx.restore();
        }
        
        // ========== UPDATE PARTICLES WITH MOUSE ATTRACTION (makes it interactive) ==========
        function updatePoints() {
            for (let i = 0; i < points.length; i++) {
                const p = points[i];
                
                // Mouse attraction force (makes the blueprint follow cursor slightly)
                const dxMouse = mouseX - p.x;
                const dyMouse = mouseY - p.y;
                const distToMouse = Math.hypot(dxMouse, dyMouse);
                if (distToMouse < 180) {
                    const force = (1 - distToMouse / 180) * 0.018;
                    p.vx += dxMouse * force;
                    p.vy += dyMouse * force;
                }
                
                // Damping to keep motion smooth
                p.vx *= 0.99;
                p.vy *= 0.99;
                
                // Limit speed
                const maxSpeed = 1.6;
                p.vx = Math.min(maxSpeed, Math.max(-maxSpeed, p.vx));
                p.vy = Math.min(maxSpeed, Math.max(-maxSpeed, p.vy));
                
                p.x += p.vx;
                p.y += p.vy;
                
                // Boundary with smooth bounce + padding
                const padding = 20;
                if (p.x < padding) { p.x = padding; p.vx *= -0.96; }
                if (p.x > width - padding) { p.x = width - padding; p.vx *= -0.96; }
                if (p.y < padding) { p.y = padding; p.vy *= -0.96; }
                if (p.y > height - padding) { p.y = height - padding; p.vy *= -0.96; }
            }
        }
        
        // ========== DRAW BLUEPRINT "SCHEMATIC" TEXTURE OVERLAY ==========
        function drawBlueprintWatermark() {
            ctx.font = "12px 'Courier New', monospace";
            ctx.fillStyle = "rgba(70, 130, 200, 0.12)";
            for (let i = 0; i < 18; i++) {
                const x = (i * 127) % width;
                const y = (i * 83) % height;
                ctx.fillText("HNS::SCHEMA v1.0", x, y);
                ctx.fillText("// blueprint_active", x + 40, y + 18);
            }
        }
        
        // ========== MAIN RENDER LOOP ==========
        function render() {
            if (!ctx) return;
            ctx.clearRect(0, 0, width, height);
            
            // Deep dark blueprint background
            ctx.fillStyle = '#05070a';
            ctx.fillRect(0, 0, width, height);
            
            drawBlueprintGrid();
            drawConnections();
            drawNodes();
            drawBlueprintFormingEffects();
            drawBlueprintWatermark();
        }
        
        function animate() {
            updatePoints();
            render();
            requestAnimationFrame(animate);
        }
        
        function handleResize() {
            resizeCanvas();
            initPoints();
        }
        
        resizeCanvas();
        initPoints();
        
        // Set mouse initial pos to center
        mouseX = width / 2;
        mouseY = height / 2;
        
        window.addEventListener('resize', handleResize);
        animate();
        
        // small optimization: on mouse leave, no big issue
        window.addEventListener('mouseleave', () => {
            // no extra action, just keep inertia natural
        });
    })();
</script>
</body>
</html>
