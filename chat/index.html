<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEBULA • HNS P2P • Chat + Calls + Files</title>
  <!-- QR Code Library -->
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #0a0c10;
      --bg-secondary: #1a1e24;
      --bg-tertiary: #252b33;
      --bg-hover: #2f3640;
      --text-primary: #e4e6eb;
      --text-secondary: #b0b3b8;
      --text-muted: #8a8f99;
      --accent-blue: #0088cc;
      --accent-green: #25D366;
      --accent-purple: #6e5be2;
      --accent-red: #f15a5a;
      --border-color: #2f3540;
      --message-outgoing: #005e99;
      --message-incoming: #262d36;
      --online-indicator: #31a24c;
    }

    body {
      background: var(--bg-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .container {
      max-width: 1400px;
      width: 100%;
      background: var(--bg-secondary);
      border-radius: 32px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
    }

    /* Login Screen */
    .login-screen {
      padding: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 600px;
    }

    .login-box {

      width: 100%;
      background: var(--bg-tertiary);
      padding: 40px;
      border-radius: 32px;
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo h1 {
      font-size: 48px;
      background: linear-gradient(135deg, #6e5be2, #0088cc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;

    }

    .input-group {
      margin-bottom: 20px;
    }

    .input-field {
      width: 100%;
      padding: 16px;
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      color: var(--text-primary);
      font-size: 16px;

    }

    .input-field:focus {
      border-color: var(--accent-blue);
    }

      width: 100%;
      padding: 16px;

      font-weight: 600;

      transition: all 0.2s;

    }

    }

    .btn-primary:hover {

    }

    .btn-secondary {

      color: var(--text-primary);
      border: 1px solid var(--border-color);

    .btn-secondary:hover {
      background: var(--bg-hover);
    }

    .challenge-area {

      padding: 20px;

    }

    .challenge-text {
      font-family: monospace;

    /* Main App */
    .app-main {

    }

    .app-main.active {

    }

    /* Sidebar */
    .sidebar {
      width: 320px;
      background: var(--bg-primary);
      border-right: 1px solid var(--border-color);
      display: flex;

    }

    .sidebar-header {

      align-items: center;

    }

    .avatar {
      width: 48px;

      justify-content: center;

      font-weight: bold;

    }

    .avatar img {

    }

    .user-info {

      overflow: hidden;
    }

    .user-name {

    .user-domain {

    .search-box {

    .search-input {

    .contacts-list {

    }

    .contact-item {

      align-items: center;

      border-radius: 12px;

    .contact-item:hover {

    }

    .contact-avatar {

      height: 48px;
      border-radius: 50%;
      background: var(--bg-tertiary);
      display: flex;
      align-items: center;
      justify-content: center;

    .contact-avatar img {

      object-fit: cover;

    .contact-details {
      flex: 1;

    }

    .contact-name {
      font-weight: 600;
      display: flex;

    }

    .online-indicator {

    }

    .online-indicator.offline {

    .contact-domain {

    }

    .last-message {

    }

    /* Chat Area */
    .chat-area {

    .chat-header {

    .chat-contact-domain {

    .chat-actions {

    }

    .message-file {

      gap: 12px;

      background: rgba(255,255,255,0.1);
    }

    .file-progress {
      width: 100%;
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      margin-top: 4px;
    }

    .file-progress-fill {
      height: 100%;
      background: var(--accent-blue);
      border-radius: 2px;
      transition: width 0.3s;
    }

    .input-area {
      padding: 20px;
      background: var(--bg-primary);
      border-top: 1px solid var(--border-color);
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }

    .input-wrapper {
      flex: 1;
      background: var(--bg-tertiary);
      border-radius: 24px;
      padding: 8px 16px;
    }

    .message-input {
      width: 100%;

      border: none;
      color: var(--text-primary);

      padding: 8px 0;

    /* Video Call Overlay */

      position: fixed;

      right: 0;

      background: rgba(0,0,0,0.95);

      display: none;
      flex-direction: column;
    }

    .video-overlay.active {

    }

    .video-grid {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .video-wrapper {
      position: relative;
      background: #000;
      border-radius: 16px;
      overflow: hidden;
    }

    .video-wrapper video {
      width: 100%;
      height: 100%;

    .video-label {
      position: absolute;
      bottom: 12px;
      left: 12px;
      background: rgba(0,0,0,0.6);
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
    }

    .video-controls {
      display: flex;
      justify-content: center;
      gap: 20px;

    }

    .video-control-btn {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: none;
      background: var(--bg-tertiary);
      color: white;
      font-size: 20px;
      cursor: pointer;
    }

    .video-control-btn.danger {
      background: var(--accent-red);
    }

    /* SDP Exchange Panel */
    .sdp-panel {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 90%;
      max-width: 600px;
      background: var(--bg-secondary);
      border-radius: 32px;
      padding: 24px;
      z-index: 2000;
      display: none;
    }

    .sdp-panel.active {
      display: block;
    }

    .sdp-textarea {
      width: 100%;
      height: 200px;
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      color: var(--text-primary);
      padding: 16px;
      font-family: monospace;
      font-size: 12px;
      margin: 16px 0;
      resize: vertical;
    }

    .qr-container {
      display: flex;
      justify-content: center;
      padding: 20px;
      background: white;
      border-radius: 16px;
      margin: 16px 0;
    }

    .modal-backdrop {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1999;
      display: none;
    }

    .modal-backdrop.active {
      display: block;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<div class="container">

  <div style="margin-bottom: 20px;">

<script>
// Configuration
const STUN_SERVERS = [
  { urls: 'stun:stun.l.google.com:19302' },
  { urls: 'stun:stun1.l.google.com:19302' },
  { urls: 'stun:stun2.l.google.com:19302' },
  { urls: 'stun:stun3.l.google.com:19302' },
  { urls: 'stun:stun4.l.google.com:19302' }
];

const ENCRYPTION_KEY = 'nebula-secret-2024';

// State
let myDomain = '';
let myProfile = null;
let currentChallenge = '';
let peerConnections = new Map(); // domain -> RTCPeerConnection
let dataChannels = new Map(); // domain -> RTCDataChannel
let mediaStreams = new Map(); // domain -> MediaStream
let contacts = new Map(); // domain -> profile
let messages = new Map(); // domain -> message array
let selectedContact = null;
let localStream = null;
let fileTransfers = new Map(); // transferId -> transfer info
let pendingCandidates = new Map(); // domain -> ICE candidates

// DOM Elements
const loginScreen = document.getElementById('loginScreen');
const appMain = document.getElementById('appMain');
const domainInput = document.getElementById('domainInput');
const loginBtn = document.getElementById('loginBtn');
const challengeArea = document.getElementById('challengeArea');
const challengeText = document.getElementById('challengeText');
const verifyBtn = document.getElementById('verifyBtn');
const loginStatus = document.getElementById('loginStatus');
const myAvatar = document.getElementById('myAvatar');
const myAvatarText = document.getElementById('myAvatarText');
const myName = document.getElementById('myName');
const myDomainEl = document.getElementById('myDomain');
const connectionStatus = document.getElementById('connectionStatus');
const searchInput = document.getElementById('searchInput');
const contactsList = document.getElementById('contactsList');
const messagesContainer = document.getElementById('messagesContainer');
const messageInput = document.getElementById('messageInput');
const sendBtn = document.getElementById('sendBtn');
const currentChatName = document.getElementById('currentChatName');
const currentChatDomain = document.getElementById('currentChatDomain');
const currentChatStatus = document.getElementById('currentChatStatus');
const viewProfileBtn = document.getElementById('viewProfileBtn');
const startAudioCallBtn = document.getElementById('startAudioCallBtn');
const startVideoCallBtn = document.getElementById('startVideoCallBtn');
const attachFileBtn = document.getElementById('attachFileBtn');
const showSDPBtn = document.getElementById('showSDPBtn');
const sdpPanel = document.getElementById('sdpPanel');
const modalBackdrop = document.getElementById('modalBackdrop');
const localSDP = document.getElementById('localSDP');
const remoteSDP = document.getElementById('remoteSDP');
const copyLocalSDPBtn = document.getElementById('copyLocalSDPBtn');
const showQRBtn = document.getElementById('showQRBtn');
const qrDisplay = document.getElementById('qrDisplay');
const connectSDPBtn = document.getElementById('connectSDPBtn');
const closeSDPBtn = document.getElementById('closeSDPBtn');
const videoOverlay = document.getElementById('videoOverlay');
const videoGrid = document.getElementById('videoGrid');
const toggleMicBtn = document.getElementById('toggleMicBtn');
const toggleCameraBtn = document.getElementById('toggleCameraBtn');
const endCallBtn = document.getElementById('endCallBtn');

// DNS TXT lookup
async function fetchTXTRecords(domain) {
  try {
    const response = await fetch(`https://api.web3dns.net/?name=${domain}&type=TXT`);
    const data = await response.json();
    
    if (data.Answer && data.Answer.length > 0) {
      return data.Answer
        .filter(record => record.type === 16)
        .map(record => record.data.replace(/"/g, ''));
    }
    return [];
  } catch (e) {
    console.error('DNS fetch error:', e);
    return [];
  }
}

// Parse profile from TXT records
function parseProfile(domain, records) {
  const profile = {
    domain: domain,
    name: domain.split('.')[0],
    avatar: null,
    bio: '',
    links: [],
    wallets: []
  };
  
  records.forEach(record => {
    const [key, ...valueParts] = record.split(':');
    const value = valueParts.join(':');
    
    switch(key) {
      case 'name': profile.name = value; break;
      case 'pfp': profile.avatar = `https://${value}`; break;
      case 'bio': profile.bio = value; break;
      case 'x':
        profile.links.push({ type: 'x', url: `https://x.com/${value}`, icon: 'fab fa-x-twitter' });
        break;
      case 'gh':
        profile.links.push({ type: 'gh', url: `https://github.com/${value}`, icon: 'fab fa-github' });
        break;
      case 'btc':
        profile.wallets.push({ currency: 'btc', address: value, icon: 'fab fa-bitcoin' });
        break;
      case 'eth':
        profile.wallets.push({ currency: 'eth', address: value, icon: 'fab fa-ethereum' });
        break;
    }
  });
  
  return profile;
}

// Login flow
loginBtn.addEventListener('click', async () => {
  const domain = domainInput.value.trim().toLowerCase();
  if (!domain) return;
  
  myDomain = domain;
  currentChallenge = 'hnschat-' + Math.random().toString(36).substring(2, 10);
  challengeText.textContent = currentChallenge;
  challengeArea.classList.remove('hidden');
  loginStatus.textContent = 'Add this TXT record to your domain, then click verify';
  
  localStorage.setItem('nebula-domain', myDomain);
  localStorage.setItem('nebula-challenge', currentChallenge);
});

verifyBtn.addEventListener('click', async () => {
  loginStatus.textContent = 'Checking DNS...';
  const txts = await fetchTXTRecords(myDomain);
  
  if (txts.includes(currentChallenge)) {
    loginStatus.textContent = '✅ Domain verified! Loading profile...';
    
    // Load own profile
    const records = await fetchTXTRecords(myDomain);
    myProfile = parseProfile(myDomain, records);
    
    // Update UI
    myName.textContent = myProfile.name;
    myDomainEl.textContent = `@${myDomain}`;
    if (myProfile.avatar) {
      myAvatar.innerHTML = `<img src="${myProfile.avatar}" alt="${myProfile.name}">`;
    } else {
      myAvatarText.textContent = myProfile.name.charAt(0).toUpperCase();
    }
    
    // Show main app
    loginScreen.style.display = 'none';
    appMain.classList.add('active');
    connectionStatus.style.background = '#31a24c';
    
    // Add sample contacts for demo
    addSampleContacts();
  } else {
    loginStatus.textContent = '❌ Challenge not found. Make sure you added the TXT record.';
  }
});

// Create RTCPeerConnection with STUN servers
function createPeerConnection(domain) {
  const pc = new RTCPeerConnection({
    iceServers: STUN_SERVERS,
    iceCandidatePoolSize: 10
  });
  
  // Handle ICE candidates
  pc.onicecandidate = (event) => {
    if (event.candidate) {
      // Store candidate for this peer
      if (!pendingCandidates.has(domain)) {
        pendingCandidates.set(domain, []);
      }
      pendingCandidates.get(domain).push(event.candidate);
      
      // Update SDP textarea if this is the current peer
      if (domain === selectedContact) {
        updateLocalSDP(domain);
      }
    }
  };
  
  // Handle connection state changes
  pc.onconnectionstatechange = () => {
    console.log(`Connection state for ${domain}:`, pc.connectionState);
    if (pc.connectionState === 'connected') {
      // User is online
      updateContactStatus(domain, true);
    } else if (pc.connectionState === 'disconnected' || pc.connectionState === 'failed') {
      updateContactStatus(domain, false);
    }
  };
  
  // Handle incoming data channels
  pc.ondatachannel = (event) => {
    const channel = event.channel;
    dataChannels.set(domain, channel);
    setupDataChannel(channel, domain);
  };
  
  // Handle incoming media streams
  pc.ontrack = (event) => {
    const [stream] = event.streams;
    mediaStreams.set(domain, stream);
    
    // Show video overlay
    if (event.track.kind === 'video') {
      showRemoteVideo(domain, stream);
    }
  };
  
  return pc;
}

// Setup data channel
function setupDataChannel(channel, domain) {
  channel.onopen = () => {
    console.log(`Data channel open with ${domain}`);
    updateContactStatus(domain, true);
    
    // Send profile info
    channel.send(JSON.stringify({
      type: 'profile',
      profile: myProfile
    }));
  };
  
  channel.onmessage = (event) => {
    const data = event.data;
    
    // Try to parse as JSON
    try {
      const obj = JSON.parse(data);
      
      if (obj.type === 'profile') {
        // Store contact profile
        if (!contacts.has(domain)) {
          contacts.set(domain, obj.profile);
          updateContactsList();
        }
        return;
      }
      
      if (obj.type === 'file-info') {
        handleFileInfo(domain, obj);
        return;
      }
      
      if (obj.type === 'file-chunk') {
        handleFileChunk(domain, obj);
        return;
      }
    } catch (e) {
      // Not JSON, treat as text message
    }
    
    // Text message
    const message = {
      type: 'text',
      text: data,
      from: domain,
      to: myDomain,
      timestamp: Date.now()
    };
    
    addMessage(domain, message);
  };
  
  channel.onclose = () => {
    updateContactStatus(domain, false);
  };
}

// Update contact online status
function updateContactStatus(domain, online) {
  const contact = contacts.get(domain);
  if (contact) {
    contact.online = online;
    updateContactsList();
    
    if (selectedContact === domain) {
      currentChatStatus.className = `online-indicator ${online ? '' : 'offline'}`;
    }
  }
}

// Add message to history
function addMessage(domain, message) {
  if (!messages.has(domain)) {
    messages.set(domain, []);
  }
  messages.get(domain).push(message);
  
  if (selectedContact === domain) {
    displayMessage(message, message.from === myDomain);
  }
  
  updateContactsList();
}

// Display message in UI
function displayMessage(message, isOwn) {
  const wrapper = document.createElement('div');
  wrapper.className = `message-wrapper ${isOwn ? 'own' : ''}`;
  
  let content = '';
  if (message.type === 'text') {
    content = `<div class="message-bubble">
      ${message.text}
      <div class="message-time">${new Date(message.timestamp).toLocaleTimeString()}</div>
    </div>`;
  } else if (message.type === 'file') {
    content = `<div class="message-bubble">
      <div class="message-file" onclick="downloadFile('${message.transferId}')">
        <i class="fas ${getFileIcon(message.fileName)}" style="font-size: 24px;"></i>
        <div style="flex:1">
          <div>${message.fileName}</div>
          <div style="font-size: 11px;">${formatFileSize(message.fileSize)}</div>
          ${message.progress ? `
            <div class="file-progress">
              <div class="file-progress-fill" style="width: ${message.progress}%"></div>
            </div>
          ` : ''}
        </div>
      </div>
      <div class="message-time">${new Date(message.timestamp).toLocaleTimeString()}</div>
    </div>`;
  }
  
  wrapper.innerHTML = content;
  messagesContainer.appendChild(wrapper);
  messagesContainer.scrollTop = messagesContainer.scrollHeight;
}

// Update contacts list UI
function updateContactsList() {
  contactsList.innerHTML = '';
  
  const sortedContacts = Array.from(contacts.values()).sort((a, b) => {
    if (a.online && !b.online) return -1;
    if (!a.online && b.online) return 1;
    return 0;
  });
  
  sortedContacts.forEach(contact => {
    const lastMsg = messages.get(contact.domain)?.slice(-1)[0];
    
    const div = document.createElement('div');
    div.className = `contact-item ${selectedContact === contact.domain ? 'selected' : ''}`;
    div.onclick = () => selectContact(contact.domain);
    
    div.innerHTML = `
      <div class="contact-avatar">
        ${contact.avatar 
          ? `<img src="${contact.avatar}" alt="${contact.name}">`
          : `<span>${contact.name.charAt(0).toUpperCase()}</span>`
        }
      </div>
      <div class="contact-details">
        <div class="contact-name">
          ${contact.name}
          <span class="online-indicator ${contact.online ? '' : 'offline'}"></span>
        </div>
        <div class="contact-domain">@${contact.domain}</div>
        <div class="last-message">${lastMsg ? lastMsg.text : ''}</div>
      </div>
    `;
    
    contactsList.appendChild(div);
  });
}

// Select contact
function selectContact(domain) {
  selectedContact = domain;
  const contact = contacts.get(domain);
  
  if (contact) {
    currentChatName.textContent = contact.name;
    currentChatDomain.textContent = `@${domain}`;
    currentChatStatus.className = `online-indicator ${contact.online ? '' : 'offline'}`;
    
    // Load messages
    messagesContainer.innerHTML = '';
    const contactMessages = messages.get(domain) || [];
    contactMessages.forEach(msg => {
      displayMessage(msg, msg.from === myDomain);
    });
    
    updateContactsList();
  }
}

// Start audio/video call
async function startCall(withVideo = false) {
  if (!selectedContact) return;
  
  try {
    // Get user media
    if (!localStream) {
      localStream = await navigator.mediaDevices.getUserMedia({
        video: withVideo,
        audio: true
      });
    }
    
    // Get or create peer connection
    let pc = peerConnections.get(selectedContact);
    if (!pc) {
      pc = createPeerConnection(selectedContact);
      peerConnections.set(selectedContact, pc);
    }
    
    // Add tracks
    localStream.getTracks().forEach(track => {
      pc.addTrack(track, localStream);
    });
    
    // Create data channel if doesn't exist
    if (!dataChannels.has(selectedContact)) {
      const channel = pc.createDataChannel('chat');
      dataChannels.set(selectedContact, channel);
      setupDataChannel(channel, selectedContact);
    }
    
    // Create offer
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    
    // Update SDP display
    updateLocalSDP(selectedContact);
    
    // Show SDP panel
    showSDPPanel();
    
    // Show local video
    if (withVideo) {
      showLocalVideo();
    }
  } catch (err) {
    console.error('Call error:', err);
    alert('Could not start call: ' + err.message);
  }
}

// Show local video
function showLocalVideo() {
  videoOverlay.classList.add('active');
  
  let wrapper = document.getElementById('video-local');
  if (!wrapper) {
    wrapper = document.createElement('div');
    wrapper.className = 'video-wrapper';
    wrapper.id = 'video-local';
    
    const video = document.createElement('video');
    video.autoplay = true;
    video.playsInline = true;
    video.muted = true;
    video.srcObject = localStream;
    
    const label = document.createElement('div');
    label.className = 'video-label';
    label.textContent = 'You';
    
    wrapper.appendChild(video);
    wrapper.appendChild(label);
    videoGrid.prepend(wrapper);
  }
}

// Show remote video
function showRemoteVideo(domain, stream) {
  videoOverlay.classList.add('active');
  
  let wrapper = document.getElementById(`video-${domain}`);
  if (!wrapper) {
    wrapper = document.createElement('div');
    wrapper.className = 'video-wrapper';
    wrapper.id = `video-${domain}`;
    
    const video = document.createElement('video');
    video.autoplay = true;
    video.playsInline = true;
    video.srcObject = stream;
    
    const label = document.createElement('div');
    label.className = 'video-label';
    label.textContent = contacts.get(domain)?.name || domain;
    
    wrapper.appendChild(video);
    wrapper.appendChild(label);
    videoGrid.appendChild(wrapper);
  }
}

// End call
function endCall() {
  // Close all peer connections
  peerConnections.forEach((pc, domain) => {
    pc.close();
  });
  
  peerConnections.clear();
  dataChannels.clear();
  mediaStreams.clear();
  pendingCandidates.clear();
  
  // Stop local stream
  if (localStream) {
    localStream.getTracks().forEach(t => t.stop());
    localStream = null;
  }
  
  // Hide video
  videoOverlay.classList.remove('active');
  videoGrid.innerHTML = '';
  
  // Update statuses
  contacts.forEach((_, domain) => {
    updateContactStatus(domain, false);
  });
}

// Update local SDP display
function updateLocalSDP(domain) {
  const pc = peerConnections.get(domain);
  if (pc && pc.localDescription) {
    const sdpInfo = {
      type: pc.localDescription.type,
      sdp: pc.localDescription.sdp,
      candidates: pendingCandidates.get(domain) || []
    };
    localSDP.value = JSON.stringify(sdpInfo, null, 2);
    
    // Generate QR code
    qrDisplay.innerHTML = '';
    new QRCode(qrDisplay, {
      text: JSON.stringify(sdpInfo),
      width: 200,
      height: 200
    });
  }
}

// Connect using remote SDP
async function connectWithSDP() {
  try {
    const remoteInfo = JSON.parse(remoteSDP.value);
    
    if (!selectedContact) {
      alert('Select a contact first');
      return;
    }
    
    // Get or create peer connection
    let pc = peerConnections.get(selectedContact);
    if (!pc) {
      pc = createPeerConnection(selectedContact);
      peerConnections.set(selectedContact, pc);
      
      // Create data channel
      const channel = pc.createDataChannel('chat');
      dataChannels.set(selectedContact, channel);
      setupDataChannel(channel, selectedContact);
    }
    
    // Set remote description
    await pc.setRemoteDescription(new RTCSessionDescription({
      type: remoteInfo.type,
      sdp: remoteInfo.sdp
    }));
    
    // Add ICE candidates
    if (remoteInfo.candidates) {
      remoteInfo.candidates.forEach(candidate => {
        pc.addIceCandidate(new RTCIceCandidate(candidate));
      });
    }
    
    // Create answer if this is an offer
    if (remoteInfo.type === 'offer') {
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      updateLocalSDP(selectedContact);
    }
    
    alert('Connected!');
    sdpPanel.classList.remove('active');
    modalBackdrop.classList.remove('active');
  } catch (err) {
    console.error('SDP connection error:', err);
    alert('Failed to connect: ' + err.message);
  }
}

// File transfer
async function sendFile(file) {
  if (!selectedContact || !dataChannels.has(selectedContact)) {
    alert('No connection to peer');
    return;
  }
  
  const channel = dataChannels.get(selectedContact);
  const transferId = Date.now() + '-' + Math.random().toString(36);
  const chunkSize = 16384; // 16KB chunks
  const totalChunks = Math.ceil(file.size / chunkSize);
  
  // Send file info
  channel.send(JSON.stringify({
    type: 'file-info',
    transferId,
    name: file.name,
    size: file.size,
    type: file.type,
    totalChunks
  }));
  
  // Add to messages
  const message = {
    type: 'file',
    fileName: file.name,
    fileSize: file.size,
    transferId,
    from: myDomain,
    to: selectedContact,
    timestamp: Date.now(),
    progress: 0
  };
  
  addMessage(selectedContact, message);
  
  // Read and send chunks
  const reader = new FileReader();
  reader.onload = (e) => {
    const arrayBuffer = e.target.result;
    const bytes = new Uint8Array(arrayBuffer);
    
    for (let i = 0; i < totalChunks; i++) {
      const start = i * chunkSize;
      const end = Math.min(start + chunkSize, file.size);
      const chunk = bytes.slice(start, end);
      
      // Convert to base64
      let binary = '';
      chunk.forEach(byte => {
        binary += String.fromCharCode(byte);
      });
      const base64 = btoa(binary);
      
      channel.send(JSON.stringify({
        type: 'file-chunk',
        transferId,
        index: i,
        data: base64
      }));
      
      // Update progress
      message.progress = Math.round(((i + 1) / totalChunks) * 100);
      
      // Update UI
      if (selectedContact) {
        messagesContainer.innerHTML = '';
        const contactMessages = messages.get(selectedContact) || [];
        contactMessages.forEach(msg => {
          displayMessage(msg, msg.from === myDomain);
        });
      }
    }
  };
  
  reader.readAsArrayBuffer(file);
}

// Handle file info
function handleFileInfo(domain, info) {
  fileTransfers.set(info.transferId, {
    ...info,
    chunks: new Array(info.totalChunks),
    received: 0,
    peerId: domain
  });
  
  const message = {
    type: 'file',
    fileName: info.name,
    fileSize: info.size,
    transferId: info.transferId,
    from: domain,
    to: myDomain,
    timestamp: Date.now(),
    progress: 0
  };
  
  addMessage(domain, message);
}

// Handle file chunk
function handleFileChunk(domain, chunk) {
  const transfer = fileTransfers.get(chunk.transferId);
  if (!transfer) return;
  
  // Decode base64
  const binary = atob(chunk.data);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) {
    bytes[i] = binary.charCodeAt(i);
  }
  
  transfer.chunks[chunk.index] = bytes;
  transfer.received++;
  
  // Update progress
  const progress = Math.round((transfer.received / transfer.totalChunks) * 100);
  
  // Update message
  const contactMessages = messages.get(domain);
  const msg = contactMessages.find(m => m.transferId === chunk.transferId);
  if (msg) {
    msg.progress = progress;
    
    if (selectedContact === domain) {
      messagesContainer.innerHTML = '';
      contactMessages.forEach(m => {
        displayMessage(m, m.from === myDomain);
      });
    }
  }
  
  // Check if complete
  if (transfer.received === transfer.totalChunks) {
    completeFileTransfer(chunk.transferId);
  }
}

// Complete file transfer
function completeFileTransfer(transferId) {
  const transfer = fileTransfers.get(transferId);
  if (!transfer) return;
  
  // Combine chunks
  let totalLength = 0;
  transfer.chunks.forEach(chunk => {
    totalLength += chunk.length;
  });
  
  const combined = new Uint8Array(totalLength);
  let offset = 0;
  transfer.chunks.forEach(chunk => {
    combined.set(chunk, offset);
    offset += chunk.length;
  });
  
  // Create blob
  const blob = new Blob([combined], { type: transfer.type });
  const url = URL.createObjectURL(blob);
  
  transfer.blobUrl = url;
  
  // Update message
  const contactMessages = messages.get(transfer.peerId);
  const msg = contactMessages.find(m => m.transferId === transferId);
  if (msg) {
    msg.complete = true;
    msg.blobUrl = url;
    
    if (selectedContact === transfer.peerId) {
      messagesContainer.innerHTML = '';
      contactMessages.forEach(m => {
        displayMessage(m, m.from === myDomain);
      });
    }
  }
}

// Download file
window.downloadFile = function(transferId) {
  const transfer = fileTransfers.get(transferId);
  if (transfer && transfer.blobUrl) {
    const a = document.createElement('a');
    a.href = transfer.blobUrl;
    a.download = transfer.name;
    a.click();
  }
};

// Helper functions
function formatFileSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1048576).toFixed(1) + ' MB';
}

function getFileIcon(filename) {
  const ext = filename.split('.').pop().toLowerCase();
  if (['jpg','jpeg','png','gif'].includes(ext)) return 'fa-file-image';
  if (['mp4','avi','mov'].includes(ext)) return 'fa-file-video';
  if (['mp3','wav'].includes(ext)) return 'fa-file-audio';
  if (['pdf'].includes(ext)) return 'fa-file-pdf';
  if (['zip','rar'].includes(ext)) return 'fa-file-archive';
  return 'fa-file';
}
